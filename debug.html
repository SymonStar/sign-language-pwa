<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Recognition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #1a1a1a;
            color: #00ff00;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
        }
        
        .camera-section {
            background: #000;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid #00ff00;
        }
        
        video, canvas {
            width: 100%;
            max-width: 640px;
            display: block;
            margin: 0 auto;
            border: 1px solid #00ff00;
        }
        
        .controls {
            text-align: center;
            margin: 20px 0;
        }
        
        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
        }
        
        button:hover {
            background: #00cc00;
        }
        
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        
        .status {
            text-align: center;
            font-size: 18px;
            margin: 10px 0;
            color: #ffff00;
        }
        
        .results {
            background: #000;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #00ff00;
            margin-top: 20px;
        }
        
        .result-section {
            margin-bottom: 30px;
        }
        
        .result-section h2 {
            color: #ffff00;
            margin-bottom: 15px;
            border-bottom: 2px solid #00ff00;
            padding-bottom: 5px;
        }
        
        .match-card {
            background: #0a0a0a;
            border: 1px solid #00ff00;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }
        
        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .match-name {
            font-size: 20px;
            font-weight: bold;
            color: #00ff00;
        }
        
        .match-score {
            font-size: 24px;
            color: #ffff00;
        }
        
        .match-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        
        .detail-item {
            background: #1a1a1a;
            padding: 8px;
            border-radius: 3px;
        }
        
        .detail-label {
            color: #888;
            font-size: 12px;
        }
        
        .detail-value {
            color: #00ff00;
            font-size: 14px;
            font-weight: bold;
        }
        
        .breakdown {
            margin-top: 10px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 5px;
        }
        
        .breakdown-title {
            color: #ffff00;
            margin-bottom: 5px;
        }
        
        .breakdown-item {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            border-bottom: 1px solid #333;
        }
        
        .warning {
            background: #ff6600;
            color: #000;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-weight: bold;
        }
        
        .success {
            background: #00ff00;
            color: #000;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-weight: bold;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .stat-card {
            background: #0a0a0a;
            border: 1px solid #00ff00;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 32px;
            color: #ffff00;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 14px;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 DEBUG RECOGNITION</h1>
        
        <div class="camera-section">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
            
            <div class="controls">
                <button id="startBtn">Start Camera</button>
                <button id="captureBtn" disabled>Capture & Analyze</button>
                <button id="stopBtn" disabled>Stop</button>
            </div>
            
            <div class="status" id="status">Ready</div>
        </div>
        
        <div id="results" class="results" style="display: none;">
            <div class="result-section">
                <h2>📊 STATISTICS</h2>
                <div id="statistics" class="stats-grid"></div>
            </div>
            
            <div class="result-section">
                <h2>🏆 BEST MATCH</h2>
                <div id="bestMatch"></div>
            </div>
            
            <div class="result-section">
                <h2>🔝 TOP 10 MATCHES</h2>
                <div id="topMatches"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    
    <script src="js/config.js"></script>
    <script src="js/poseDetector.js"></script>
    
    <script>
        const DEBUG_API = 'http://localhost:5001/api/debug-recognize';
        
        let poseDetector = null;
        let isCapturing = false;
        let captureFrames = [];
        
        const elements = {
            video: document.getElementById('webcam'),
            canvas: document.getElementById('canvas'),
            status: document.getElementById('status'),
            startBtn: document.getElementById('startBtn'),
            captureBtn: document.getElementById('captureBtn'),
            stopBtn: document.getElementById('stopBtn'),
            results: document.getElementById('results'),
            statistics: document.getElementById('statistics'),
            bestMatch: document.getElementById('bestMatch'),
            topMatches: document.getElementById('topMatches')
        };
        
        elements.startBtn.addEventListener('click', start);
        elements.captureBtn.addEventListener('click', capture);
        elements.stopBtn.addEventListener('click', stop);
        
        async function start() {
            try {
                elements.status.textContent = 'Starting camera...';
                
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user' }
                });
                
                poseDetector = new PoseDetector(elements.video, elements.canvas);
                elements.video.srcObject = stream;
                
                await new Promise((resolve) => {
                    elements.video.onloadedmetadata = () => {
                        elements.canvas.width = elements.video.videoWidth;
                        elements.canvas.height = elements.video.videoHeight;
                        resolve();
                    };
                });
                
                await poseDetector.initialize();
                poseDetector.processFrame();
                
                elements.startBtn.disabled = true;
                elements.captureBtn.disabled = false;
                elements.stopBtn.disabled = false;
                elements.status.textContent = 'Ready to capture';
                
            } catch (error) {
                console.error('Start error:', error);
                elements.status.textContent = 'Error: ' + error.message;
            }
        }
        
        async function capture() {
            if (isCapturing) return;
            
            isCapturing = true;
            captureFrames = [];
            elements.captureBtn.disabled = true;
            elements.status.textContent = 'Capturing... (2 seconds)';
            
            // Capture for 2 seconds
            const captureInterval = setInterval(() => {
                if (poseDetector && poseDetector.lastFrame) {
                    captureFrames.push(poseDetector.lastFrame);
                }
            }, 33);
            
            await new Promise(resolve => setTimeout(resolve, 2000));
            clearInterval(captureInterval);
            
            elements.status.textContent = `Analyzing ${captureFrames.length} frames...`;
            
            // Send to debug API
            try {
                const response = await fetch(DEBUG_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ frames: captureFrames })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    displayResults(result);
                    elements.status.textContent = 'Analysis complete!';
                } else {
                    elements.status.textContent = 'Error: ' + result.error;
                }
                
            } catch (error) {
                console.error('Analysis error:', error);
                elements.status.textContent = 'Error: ' + error.message;
            }
            
            isCapturing = false;
            elements.captureBtn.disabled = false;
        }
        
        function displayResults(result) {
            elements.results.style.display = 'block';
            
            // Statistics
            const stats = result.statistics;
            elements.statistics.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${stats.input_frames}</div>
                    <div class="stat-label">Input Frames</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.feature_frames}</div>
                    <div class="stat-label">Feature Frames</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.feature_shape[1]}</div>
                    <div class="stat-label">Features per Frame</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.feature_mean.toFixed(4)}</div>
                    <div class="stat-label">Feature Mean</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.feature_std.toFixed(4)}</div>
                    <div class="stat-label">Feature Std Dev</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.top_5_range.toFixed(4)}</div>
                    <div class="stat-label">Top 5 Range</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.above_threshold}</div>
                    <div class="stat-label">Above Threshold</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.total_templates}</div>
                    <div class="stat-label">Total Templates</div>
                </div>
            `;
            
            // Warnings
            let warnings = '';
            if (stats.top_5_range < 0.1) {
                warnings += '<div class="warning">⚠️ Top 5 matches too close together! Features not discriminative enough.</div>';
            }
            if (stats.above_threshold > stats.total_templates * 0.2) {
                warnings += '<div class="warning">⚠️ Too many signs above threshold! Consider raising threshold.</div>';
            }
            
            // Best Match
            const best = result.best_match;
            elements.bestMatch.innerHTML = warnings + `
                <div class="match-card">
                    <div class="match-header">
                        <div class="match-name">${best.gesture}</div>
                        <div class="match-score">${(best.confidence * 100).toFixed(1)}%</div>
                    </div>
                    ${best.passes_threshold ? 
                        '<div class="success">✓ Passes confidence threshold (0.6)</div>' :
                        '<div class="warning">✗ Below confidence threshold (0.6)</div>'
                    }
                </div>
            `;
            
            // Top 10
            elements.topMatches.innerHTML = result.top_10.map((match, i) => `
                <div class="match-card">
                    <div class="match-header">
                        <div class="match-name">#${i+1} ${match.gesture}</div>
                        <div class="match-score">${(match.similarity * 100).toFixed(1)}%</div>
                    </div>
                    
                    <div class="match-details">
                        <div class="detail-item">
                            <div class="detail-label">Total Distance</div>
                            <div class="detail-value">${match.total_distance.toFixed(2)}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Normalized Distance</div>
                            <div class="detail-value">${match.normalized_distance.toFixed(4)}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Template Frames</div>
                            <div class="detail-value">${match.template_frames}</div>
                        </div>
                    </div>
                    
                    <div class="breakdown">
                        <div class="breakdown-title">Feature Breakdown:</div>
                        ${Object.entries(match.breakdown).map(([key, val]) => `
                            <div class="breakdown-item">
                                <span>${key}</span>
                                <span>${val.toFixed(2)}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            
            // Scroll to results
            elements.results.scrollIntoView({ behavior: 'smooth' });
        }
        
        function stop() {
            if (poseDetector) {
                poseDetector.stop();
                poseDetector.clearCanvas();
            }
            
            elements.startBtn.disabled = false;
            elements.captureBtn.disabled = true;
            elements.stopBtn.disabled = true;
            elements.status.textContent = 'Stopped';
        }
    </script>
</body>
</html>
