<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>Sign Language Translator</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Mode Toggle -->
        <div class="mode-toggle" style="display: flex; justify-content: center; gap: 20px; padding: 15px; background: rgba(0, 0, 0, 0.3); border-radius: 10px; margin-bottom: 20px;">
            <span style="padding: 10px 20px; background: #4CAF50; border-radius: 5px; color: white; font-weight: bold;">Continuous Mode</span>
            <a href="word-mode.html" style="padding: 10px 20px; background: rgba(255, 255, 255, 0.1); border-radius: 5px; color: white; text-decoration: none;">Word-by-Word Mode</a>
        </div>

        <!-- Camera View -->
        <div class="camera-container">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
        </div>

        <!-- Translation Display -->
        <div class="translation-box">
            <div class="status" id="status">Initializing...</div>
            <div class="translation" id="translation">Start signing...</div>
            <div class="words" id="words"></div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button id="startBtn" class="btn btn-primary">Start Camera</button>
            <button id="stopBtn" class="btn btn-secondary" style="display:none;">Stop</button>
        </div>
    </div>

    <!-- MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    
    <!-- App Scripts -->
    <script src="js/config.js"></script>
    <script src="js/poseDetector.js"></script>
    <script src="js/apiClient.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
